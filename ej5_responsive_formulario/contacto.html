<main style="display: flex; flex-wrap: wrap; gap: 20px;">

<section>

    <h2> Contacto : </h2>
    <form action="#" method="POST">
    <div> 
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required minlength="3">
    </div>
    <div>
        <label for="apellido"> Apellido completo:</label>
        <input type="text" id="apellido" name="apellido" required minlength="3">
    </div>
    <div> 
        <label for="email"> ingrese mail:</label>
        <input type="text" id="email" name="email" required minlength="8"> 
    </div>
    <div> 
        <label for="dni"> ingrese DNI :</label>
        <input type="number" id="DNI" name="DNI" required minlength="1000000" maxlength="100000000"> 
    </div>
    <button type="submit">Enviar respuesta</button>
</form>
</section>
